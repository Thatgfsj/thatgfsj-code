[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; Serial flasher settings
upload_port = COM3
monitor_port = COM3

; ESP32 specific
board_build.partitions = default.csv
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Required libraries
lib_deps = 
    bblanchon/ArduinoJson@^6.21.3
    ; BLE and WiFi are built-in to ESP32 arduino core

; For ESP32-S3 or other boards, uncomment:
; board = esp32-s3-devkitc-1
